services:
  map_back_service:
    container_name: 'map_back'
    build:
      context: .
    volumes:
      - static-data:/app/src/static/images
    #ports:
    #  - "8000:8000"
    networks:
      - MapNetwork
    env_file:
      - .env

  map_celery_worker_service:
    container_name: 'map_celery_worker'
    build:
      context: .
    volumes:
      - static-data:/app/src/static/images
    networks:
      - MapNetwork
    env_file:
      - .env
    command: "celery --app=src.tasks.celery_app:celery_instance worker -l INFO"

volumes:
  static-data:

networks:
  MapNetwork:
    external: true